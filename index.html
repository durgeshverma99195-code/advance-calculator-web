<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
</head>
<body>
    <div class="main">
        <div class="main2">
          <p>Calculator</p>
          <div class="menu">
            <i class="fa-solid fa-bars"></i>
            <span>Standard</span>
          </div>

           <input placeholder="0" type="text" id="display" readonly>

           <div class="mc">
            <p>MC</p>
            <p>MR</p>
            <p>M+</p>
            <p>M-</p>
            <p>MS</p>
            
        </div>

     <div class="buttons">
        <div class="button">
            <button id="ce">CE</button>
            <button id="c">C</button>
            <button class="green">%</button>
            <button class="green">/</button>
        </div>
        <div class="button">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="green">*</button>
        </div>
        <div class="button">
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="green">-</button>
        </div>
        <div class="button">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="green">+</button>
        </div>
        <div class="button">
            <button class="black">00</button>
            <button>0</button>
            <button>.</button>
            <button class="equal">=</button>
        </div>
        
     </div>
        </div>
       
    </div>
    <script src="script.js"></script>
</body>
</html>
